<!DOCTYPE html>
<html>
<head>

    This is a placeholder for base href that will be replaced by the value of

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="classroom_wifi_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>classroom_wifi_app</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- SheetJS for Excel export (支持带颜色的 Excel 生成) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  
  <!-- Screenshot helper function -->
  <script>
    // 全局截图函数，供 Flutter 调用
    window.captureScreenshot = function() {
      return new Promise(function(resolve, reject) {
        if (typeof html2canvas === 'undefined') {
          reject('html2canvas not loaded');
          return;
        }
        
        html2canvas(document.body, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          logging: true,
          width: window.innerWidth,
          height: window.innerHeight
        }).then(function(canvas) {
          var dataUrl = canvas.toDataURL('image/png');
          resolve(dataUrl);
        }).catch(function(err) {
          reject('html2canvas error: ' + err);
        });
      });
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // 注册自定义 Service Worker（仅在支持的环境中）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('service_worker.js')
          .then(function(registration) {
            console.log('ServiceWorker registration successful:', registration.scope);
          })
          .catch(function(error) {
            console.log('ServiceWorker registration failed:', error);
          });
      });
    }
  </script>
</body>

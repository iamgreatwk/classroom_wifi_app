name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Create iOS project if not exists
      run: |
        if [ ! -d "ios" ]; then
          echo "Creating iOS project..."
          flutter create --platforms ios --org com.example.classroom .
        else
          echo "iOS project already exists"
        fi
        
    - name: Update Podfile minimum iOS version
      run: |
        cd ios
        # 确保 Podfile 使用正确的 iOS 版本
        if [ -f "Podfile" ]; then
          sed -i '' 's/platform :ios, .*/platform :ios, '13.0'/g' Podfile
          cat Podfile
        fi
        
    - name: Configure iOS for no codesign
      run: |
        cd ios
        # 修改 Xcode 项目配置，禁用代码签名
        sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj 2>/dev/null || true
        sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj 2>/dev/null || true
        sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' Runner.xcodeproj/project.pbxproj 2>/dev/null || true
        sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = .*/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";/g' Runner.xcodeproj/project.pbxproj 2>/dev/null || true
        
    - name: Install CocoaPods
      run: |
        cd ios
        pod install --repo-update || true
        
    - name: Build iOS (no codesign)
      run: |
        flutter build ios --release --no-codesign
        
    - name: Create IPA from app
      run: |
        APP_PATH="build/ios/iphoneos/Runner.app"
        
        if [ -d "$APP_PATH" ]; then
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r classroom_wifi_app.ipa Payload
          rm -rf Payload
          echo "IPA created successfully"
          ls -lh classroom_wifi_app.ipa
        else
          echo "App not found at $APP_PATH"
          find . -name "*.app" -type d 2>/dev/null
          exit 1
        fi
        
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: classroom_wifi_app-ipa
        path: classroom_wifi_app.ipa
        retention-days: 30
        
    - name: Upload IPA to Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: classroom_wifi_app.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

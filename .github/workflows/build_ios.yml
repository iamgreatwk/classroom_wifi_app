name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Create iOS project if not exists
      run: |
        if [ ! -d "ios" ]; then
          echo "Creating iOS project..."
          flutter create --platforms ios --org com.example.classroom .
        else
          echo "iOS project already exists"
        fi
        
    - name: Install CocoaPods
      run: |
        cd ios
        pod install --repo-update || true
        
    - name: Build iOS for Simulator (no codesign needed)
      run: |
        # 构建模拟器版本，不需要签名和开发者账号
        flutter build ios --simulator --release
        
    - name: Create IPA from app
      run: |
        # 模拟器版本路径不同
        APP_PATH="build/ios/iphonesimulator/Runner.app"
        
        if [ -d "$APP_PATH" ]; then
          echo "Found simulator app at $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r classroom_wifi_app.ipa Payload
          rm -rf Payload
          echo "IPA created successfully"
          ls -lh classroom_wifi_app.ipa
        else
          echo "App not found at $APP_PATH"
          echo "Searching for any .app files..."
          find . -name "*.app" -type d 2>/dev/null
          exit 1
        fi
        
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: classroom_wifi_app-ipa
        path: classroom_wifi_app.ipa
        retention-days: 30
        
    - name: Upload IPA to Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: classroom_wifi_app.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
